# Define key constants
define ASN = 63477;
define SOURCE4 = 155.103.251.1;
define SOURCE6 = 2602:f542:bee::1;

define LOCALv4 = [
  155.103.251.0/24
];

define LOCALv6 = [
  155.103.251.0/24
];

protocol static static4 {
    ipv4 {};
    route 155.103.251.0/24 via SOURCE4;
}

protocol static static6 {
  ipv6;
  route 2602:f542:bee::/48 via SOURCE6;
}

import "base.conf"

# AndrewNet Upstream
protocol bgp up4_as1003 from base4 {
  local as MY_ASN;
  neighbor 23.143.82.1 as 1003;

  ipv4 {
    import keep filtered;
    import where import_transit(1003, true);
  };
}

protocol bgp up6_as1003 from base6 {
  neighbor 2602:fc26:12::1 as 1003;

  ipv6 {
    import keep filtered;
    import where import_transit(1003, true);
  };
}

# Ensuring bird doesn't fw tailscale
protocol static tailscale4 {
  ipv4;
  route 100.64.0.0/10 via "tailscale0";
}

protocol static tailscale6 {
  ipv6;
  route fd7a:115c:a1e0::/48 via "tailscale0";
}